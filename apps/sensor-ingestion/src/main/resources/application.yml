server:
  port: 8081
  shutdown: graceful

grpc:
  port: 9091

spring:
  application:
    name: sensor-ingestion
  lifecycle:
    timeout-per-shutdown-phase: 20s
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/smartcity}
    username: ${SPRING_DATASOURCE_USERNAME:smartcity}
    password: ${SPRING_DATASOURCE_PASSWORD:smartcity}
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  jackson:
    property-naming-strategy: SNAKE_CASE

ingestion:
  mqtt:
    enabled: true
    broker-url: ${MQTT_BROKER_URL:tcp://localhost:1883}
    client-id: sensor-ingestion-service
    topic: sensors/+/readings

resilience4j:
  circuitbreaker:
    instances:
      kafka-producer:
        register-health-indicator: true
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  structured:
    format:
      console: ecs

otel:
  sdk:
    disabled: ${OTEL_SDK_DISABLED:true}
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}
  service:
    name: ${spring.application.name}
  resource:
    attributes:
      deployment.environment: ${DEPLOY_ENV:local}
