server:
  port: 8081
  shutdown: graceful

spring:
  application:
    name: sensor-ingestion
  lifecycle:
    timeout-per-shutdown-phase: 20s

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  # Structured JSON logging (Elastic Common Schema). Native Spring Boot support;
  # remove this (or override via LOGGING_STRUCTURED_FORMAT_CONSOLE) for human-readable
  # logs during local development. Note: requires Spring Boot >= 3.4 to take effect;
  # on the 3.3 parent this property is ignored and plain console logging is used.
  structured:
    format:
      console: ecs

# OpenTelemetry (opentelemetry-spring-boot-starter).
#
# The SDK is DISABLED by default so the skeleton runs anywhere without an OTLP
# collector. To enable tracing/metrics export, set BOTH:
#   OTEL_SDK_DISABLED=false
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
# i.e. the exporter is only active when an endpoint is provided and the SDK is
# explicitly switched on. (otel.sdk.disabled with an env default of "true" is
# the simple route; no conditional config needed.)
otel:
  sdk:
    disabled: ${OTEL_SDK_DISABLED:true}
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}
  service:
    name: ${spring.application.name}
  resource:
    attributes:
      deployment.environment: ${DEPLOY_ENV:local}
