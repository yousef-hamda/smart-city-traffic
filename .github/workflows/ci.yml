# CI — lint, typecheck, test per language ecosystem.
# Image build + Trivy scan + SBOM jobs are appended in Phase 21 (security
# hardening); coverage gates ratchet to 70% in Phase 22.
name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Node workspaces (lint · typecheck · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --if-present lint
      - run: pnpm -r --if-present typecheck
      - run: pnpm -r --if-present test
      - run: pnpm -r --if-present build

  python:
    name: Python services (ruff · mypy · pytest)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - vision-service
          - ml-prediction
          - rl-optimizer
          - federated-coordinator
          - ai-assistant
          - voice-gateway
          - sensor-simulator
          - camera-simulator
    defaults:
      run:
        working-directory: apps/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check src tests
      - run: mypy src
      - run: pytest -q

  graph:
    name: Knowledge graph (derivation + algorithms)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e "apps/sensor-simulator" pytest ruff
      - run: ruff check scripts/seed
      - run: PYTHONPATH=apps/sensor-simulator/src:scripts/seed python -m pytest scripts/seed/tests -q

  java:
    name: sensor-ingestion (mvn verify)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/sensor-ingestion
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - run: ./mvnw -q --batch-mode verify

  secrets-scan:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

  trivy:
    name: Image scan + SBOM (Trivy · Syft)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - vision-service
          - ml-prediction
          - sensor-ingestion
          - api-gateway
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -f infra/docker/${{ matrix.service }}.Dockerfile -t scan/${{ matrix.service }}:ci .
      - name: Trivy scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: scan/${{ matrix.service }}:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: scan/${{ matrix.service }}:ci
          format: spdx-json
          artifact-name: sbom-${{ matrix.service }}.spdx.json

  commitlint:
    name: Conventional commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
