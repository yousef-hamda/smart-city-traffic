# Smart City Traffic Optimization Platform — full local stack.
#
#   make dev          → infra + all application services
#   docker compose --profile infra up -d   → data/streaming layer only
#
# Every container has a healthcheck; application services wait for their
# dependencies to be healthy before starting.

name: smart-city-traffic

x-otel-env: &otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc

services:
  # ──────────────────────────── data & streaming layer ───────────────────────
  postgres:
    image: timescale/timescaledb-ha:pg16
    profiles: ["infra", "apps"]
    environment:
      POSTGRES_USER: traffic
      POSTGRES_PASSWORD: traffic_dev_password
      POSTGRES_DB: traffic
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/home/postgres/pgdata/data
      - ./scripts/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traffic -d traffic"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    profiles: ["infra", "apps"]
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  kafka:
    image: apache/kafka:3.8.0
    profiles: ["infra", "apps"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 24
    ports:
      - "29092:29092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 10s
      retries: 12

  kafka-init:
    image: apache/kafka:3.8.0
    profiles: ["infra", "apps"]
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/topics/create-topics.sh"]
    volumes:
      - ./scripts/kafka:/topics:ro
    restart: "no"

  mongodb:
    image: mongo:7
    profiles: ["infra", "apps"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: traffic
      MONGO_INITDB_ROOT_PASSWORD: traffic_dev_password
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 12

  neo4j:
    image: neo4j:5
    profiles: ["infra", "apps"]
    environment:
      NEO4J_AUTH: neo4j/traffic_dev_password
      NEO4J_PLUGINS: '["graph-data-science", "apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
      - ./neo4j:/seed:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    profiles: ["infra", "apps"]
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: traffic
      MINIO_ROOT_PASSWORD: traffic_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 12

  mosquitto:
    image: eclipse-mosquitto:2
    profiles: ["infra", "apps"]
    ports:
      - "1883:1883"
      - "9002:9001"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -W 3 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  # ──────────────────────────── application services ─────────────────────────
  sensor-ingestion:
    build:
      context: .
      dockerfile: infra/docker/sensor-ingestion.Dockerfile
    profiles: ["apps"]
    environment:
      <<: *otel-env
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/traffic
      SPRING_DATASOURCE_USERNAME: traffic
      SPRING_DATASOURCE_PASSWORD: traffic_dev_password
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MQTT_BROKER_URL: tcp://mosquitto:1883
    ports:
      - "8081:8081"
      - "9091:9091" # gRPC
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  vision-service:
    build:
      context: .
      dockerfile: infra/docker/vision-service.Dockerfile
    profiles: ["apps"]
    environment:
      <<: *otel-env
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8082:8082"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  ml-prediction:
    build:
      context: .
      dockerfile: infra/docker/ml-prediction.Dockerfile
    profiles: ["apps"]
    environment:
      <<: *otel-env
      POSTGRES_DSN: postgresql://traffic:traffic_dev_password@postgres:5432/traffic
      REDIS_URL: redis://redis:6379/1
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8083:8083"
      - "9093:9093" # gRPC
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  rl-optimizer:
    build:
      context: .
      dockerfile: infra/docker/rl-optimizer.Dockerfile
    profiles: ["apps"]
    environment:
      <<: *otel-env
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8084:8084"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8084/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  federated-coordinator:
    build:
      context: .
      dockerfile: infra/docker/federated-coordinator.Dockerfile
    profiles: ["apps"]
    environment:
      <<: *otel-env
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8085/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  ai-assistant:
    build:
      context: .
      dockerfile: infra/docker/ai-assistant.Dockerfile
    profiles: ["apps"]
    environment:
      <<: *otel-env
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      POSTGRES_DSN: postgresql://traffic:traffic_dev_password@postgres:5432/traffic
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_PASSWORD: traffic_dev_password
    ports:
      - "8086:8086"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8086/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  voice-gateway:
    build:
      context: .
      dockerfile: infra/docker/voice-gateway.Dockerfile
    profiles: ["apps"]
    environment:
      <<: *otel-env
      AI_ASSISTANT_URL: http://ai-assistant:8086
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
    ports:
      - "8087:8087"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8087/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  api-gateway:
    build:
      context: .
      dockerfile: infra/docker/api-gateway.Dockerfile
    profiles: ["apps"]
    environment:
      <<: *otel-env
      DATABASE_URL: postgresql://traffic:traffic_dev_password@postgres:5432/traffic
      REDIS_URL: redis://redis:6379/2
      JWT_ACCESS_SECRET: dev_access_secret_change_me
      JWT_REFRESH_SECRET: dev_refresh_secret_change_me
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  realtime-gateway:
    build:
      context: .
      dockerfile: infra/docker/realtime-gateway.Dockerfile
    profiles: ["apps"]
    environment:
      <<: *otel-env
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379/3
      JWT_ACCESS_SECRET: dev_access_secret_change_me
    ports:
      - "8088:8088"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8088/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
    profiles: ["apps"]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_REALTIME_URL: http://localhost:8088
    ports:
      - "3000:3000"
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  developer-portal:
    build:
      context: .
      dockerfile: infra/docker/developer-portal.Dockerfile
    profiles: ["apps"]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  sensor-simulator:
    build:
      context: .
      dockerfile: infra/docker/sensor-simulator.Dockerfile
    profiles: ["sim"]
    environment:
      INGESTION_HTTP_URL: http://sensor-ingestion:8081
      MQTT_BROKER_HOST: mosquitto
    depends_on:
      mosquitto:
        condition: service_healthy

  camera-simulator:
    build:
      context: .
      dockerfile: infra/docker/camera-simulator.Dockerfile
    profiles: ["sim"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  # ──────────────────────────── analytics / lakehouse ────────────────────────
  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    profiles: ["analytics"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 traffic traffic_dev_password &&
      mc mb --ignore-existing local/traffic-lake &&
      echo 'lake bucket ready'"
    restart: "no"

  trino:
    image: trinodb/trino:455
    profiles: ["analytics"]
    ports:
      - "8090:8080"
    volumes:
      - ./infra/trino/catalog:/etc/trino/catalog:ro
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:8080/v1/info | grep -q starting && exit 1 || exit 0",
        ]
      interval: 15s
      timeout: 5s
      retries: 12

  flink-jobmanager:
    image: apache/flink:1.20-scala_2.12-java17
    profiles: ["analytics"]
    command: jobmanager
    ports:
      - "8091:8081"
    environment:
      FLINK_PROPERTIES: "jobmanager.rpc.address: flink-jobmanager"
    depends_on:
      kafka:
        condition: service_healthy

  flink-taskmanager:
    image: apache/flink:1.20-scala_2.12-java17
    profiles: ["analytics"]
    command: taskmanager
    environment:
      FLINK_PROPERTIES: "jobmanager.rpc.address: flink-jobmanager\ntaskmanager.numberOfTaskSlots: 4"
    depends_on:
      - flink-jobmanager

  superset:
    image: apache/superset:4.0.2
    profiles: ["analytics"]
    ports:
      - "8092:8088"
    environment:
      SUPERSET_SECRET_KEY: superset_dev_secret_change_me
    depends_on:
      trino:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8088/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 12

  # ──────────────────────────── observability ────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: ["observability"]
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - ./infra/prometheus/slo_alerts.yml:/etc/prometheus/slo_alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml

  alertmanager:
    image: prom/alertmanager:v0.27.0
    profiles: ["observability"]
    ports:
      - "9095:9093"
    volumes:
      - ./infra/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

  loki:
    image: grafana/loki:3.1.1
    profiles: ["observability"]
    ports:
      - "3100:3100"
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  tempo:
    image: grafana/tempo:2.6.0
    profiles: ["observability", "apps"]
    ports:
      - "3200:3200"
      - "4317:4317"
    volumes:
      - ./infra/tempo/tempo-config.yml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    command: -config.file=/etc/tempo.yaml

  grafana:
    image: grafana/grafana:11.2.0
    profiles: ["observability"]
    ports:
      - "3030:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ADMIN_PASSWORD: traffic_dev_password
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo

  # ──────────────────────────── secrets ──────────────────────────────────────
  vault:
    image: hashicorp/vault:1.17
    profiles: ["security"]
    cap_add: ["IPC_LOCK"]
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    healthcheck:
      test: ["CMD-SHELL", "vault status -address=http://localhost:8200 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  prometheus-data:
  loki-data:
  tempo-data:
  grafana-data:
  mongo-data:
  neo4j-data:
  minio-data:
  mosquitto-data:
