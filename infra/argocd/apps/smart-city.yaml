# The platform Application — deploys the umbrella Helm chart. Argo Rollouts
# drives the ml-prediction canary defined in the chart.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: smart-city
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/yousef-hamda/smart-city-traffic.git
    targetRevision: main
    path: infra/helm/smart-city
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: smart-city
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
