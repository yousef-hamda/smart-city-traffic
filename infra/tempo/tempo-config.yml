# Tempo receives OTLP traces (gRPC :4317) from every service's OpenTelemetry
# SDK and stores them on the local filesystem. Grafana queries Tempo and links
# traces to Loki logs by trace_id for end-to-end correlation across the
# Java -> Kafka -> Python -> gRPC -> Node -> browser path.
server:
  http_listen_port: 3200
distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
ingester:
  max_block_duration: 5m
storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal
