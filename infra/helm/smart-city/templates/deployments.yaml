{{/* A Deployment per entry in .Values.services. */}}
{{- range $name, $svc := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    {{- include "smart-city.labels" $ | nindent 4 }}
    {{- include "smart-city.selectorLabels" (dict "name" $name) | nindent 4 }}
spec:
  replicas: {{ $svc.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "smart-city.selectorLabels" (dict "name" $name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "smart-city.selectorLabels" (dict "name" $name) | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ $svc.port }}"
    spec:
      containers:
        - name: {{ $name }}
          image: {{ include "smart-city.image" (dict "ctx" $ "name" $name) }}
          ports:
            - containerPort: {{ $svc.port }}
          envFrom:
            - configMapRef:
                name: platform-config
          resources:
            {{- toYaml $.Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: {{ if eq $name "sensor-ingestion" }}/actuator/health{{ else if eq $name "frontend" }}/api/health{{ else }}/health{{ end }}
              port: {{ $svc.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: {{ if eq $name "sensor-ingestion" }}/actuator/health{{ else if eq $name "frontend" }}/api/health{{ else }}/health{{ end }}
              port: {{ $svc.port }}
            initialDelaySeconds: 20
            periodSeconds: 20
{{- end }}
