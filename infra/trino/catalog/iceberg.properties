# Trino → Iceberg catalog over MinIO (S3-compatible). dbt-trino and Superset
# query the lake through this catalog.
connector.name=iceberg
iceberg.catalog.type=hadoop
hive.metastore=file
hive.metastore.catalog.dir=s3a://traffic-lake/warehouse

fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.path-style-access=true
s3.aws-access-key=traffic
s3.aws-secret-key=traffic_dev_password
s3.region=us-east-1
