# Grafana datasources with cross-correlation: Tempo traces link to Loki logs
# (tracesToLogs) and Loki logs expose a trace_id derived field that jumps back
# to Tempo — so one click moves between a log line and its distributed trace.
apiVersion: 1
datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    jsonData:
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: '"trace_id":"(\w+)"'
          name: TraceID
          url: "$${__value.raw}"
  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        filterByTraceID: true
        tags: [{ key: "service.name", value: "service" }]
      serviceMap:
        datasourceUid: prometheus
