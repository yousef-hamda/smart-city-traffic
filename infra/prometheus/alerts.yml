# Platform alert rules. SLO burn-rate alerts (multi-window) live in
# infra/prometheus/slo_alerts.yml and are documented in docs/runbooks/slos.md.
groups:
  - name: availability
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: "{{ $labels.job }} is down"
          description: "{{ $labels.job }} ({{ $labels.instance }}) has been unreachable for 1m."

      - alert: HighHttp5xxRate
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) by (job)
            / sum(rate(http_server_requests_seconds_count[5m])) by (job) > 0.05
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "Elevated 5xx on {{ $labels.job }}"
          description: ">5% of requests are 5xx over 5m."

  - name: latency
    rules:
      - alert: HighP95Latency
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_server_requests_seconds_bucket[5m])) by (le, job)) > 1
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "p95 latency > 1s on {{ $labels.job }}"
          description: "95th-percentile request latency exceeded 1s for 10m."

  - name: pipeline
    rules:
      - alert: KafkaConsumerLagGrowing
        expr: kafka_consumergroup_lag > 10000
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "Kafka consumer lag high for {{ $labels.consumergroup }}"
          description: "Consumer lag > 10k for 10m — a consumer may be stuck or under-scaled."

      - alert: PredictionStaleness
        expr: time() - max(prediction_last_generated_timestamp_seconds) > 60
        for: 2m
        labels: { severity: warning }
        annotations:
          summary: "Predictions are stale"
          description: "No fresh prediction in 60s — the ML service or its inputs may be down."
