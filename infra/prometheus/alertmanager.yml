# Alertmanager routing. In dev, alerts are grouped and logged to a webhook
# receiver; production would wire Slack/PagerDuty here.
route:
  receiver: default
  group_by: ["alertname", "job"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers: [severity="critical"]
      receiver: critical
      repeat_interval: 1h

receivers:
  - name: default
    webhook_configs:
      - url: http://host.docker.internal:5001/alerts
        send_resolved: true
  - name: critical
    webhook_configs:
      - url: http://host.docker.internal:5001/alerts/critical
        send_resolved: true

inhibit_rules:
  - source_matchers: [severity="critical"]
    target_matchers: [severity="warning"]
    equal: ["alertname", "job"]
