  namespace: smart-city
  labels:
    app.kubernetes.io/part-of: smart-city-traffic
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: smart-city-0.1.0
data:
  # Non-secret runtime config shared by all services. Secrets come from Vault
  # (see infra/vault) and are injected separately, never in this ConfigMap.
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  REDIS_URL: "redis://redis:6379/0"
  NEO4J_URI: "bolt://neo4j:7687"
  MLFLOW_TRACKING_URI: "http://mlflow:5000"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://tempo:4317"
  OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"

