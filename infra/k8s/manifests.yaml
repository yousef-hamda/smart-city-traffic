# Source: smart-city/templates/rollout-ml-prediction.yaml
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: ml-prediction-canary
  namespace: smart-city
spec:
  metrics:
    - name: p95-latency
      interval: 30s
      count: 3
      successCondition: result < 0.25
      failureLimit: 1
      provider:
        prometheus:
          address: http://prometheus.smart-city:9090
          query: |
            histogram_quantile(0.95,
              sum(rate(http_server_requests_seconds_bucket{job="ml-prediction"}[1m])) by (le))
    - name: success-rate
      interval: 30s
      count: 3
      successCondition: result >= 0.99
      failureLimit: 1
      provider:
        prometheus:
          address: http://prometheus.smart-city:9090
          query: |
            sum(rate(http_server_requests_seconds_count{job="ml-prediction",status!~"5.."}[1m]))
              / sum(rate(http_server_requests_seconds_count{job="ml-prediction"}[1m]))

---
# Source: smart-city/templates/istio.yaml
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: ml-prediction
  namespace: smart-city
spec:
  host: ml-prediction
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http2MaxRequests: 200
        maxRequestsPerConnection: 10
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
  subsets:
    - name: stable
      labels: { app.kubernetes.io/name: ml-prediction, role: stable }
    - name: canary
      labels: { app.kubernetes.io/name: ml-prediction, role: canary }
---
# Source: smart-city/templates/istio.yaml
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: default
  namespace: smart-city
spec:
  mtls:
    mode: STRICT
---
# Source: smart-city/templates/rollout-ml-prediction.yaml
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: ml-prediction
  namespace: smart-city
  labels:
    app.kubernetes.io/part-of: smart-city-traffic
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: smart-city-0.1.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: ml-prediction
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ml-prediction
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8083"
    spec:
      containers:
        - name: ml-prediction
          image: ghcr.io/yousef-hamda/smart-city/ml-prediction:0.1.0
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: platform-config
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          readinessProbe:
            httpGet: { path: /health, port: 8083 }
            initialDelaySeconds: 10
  strategy:
    canary:
      trafficRouting:
        istio:
          virtualService:
            name: ml-prediction
            routes: [primary]
      steps:
        - setWeight: 10
        - pause: { duration: 60s }
        - analysis:
            templates:
              - templateName: ml-prediction-canary
        - setWeight: 25
        - pause: { duration: 60s }
        - analysis:
            templates:
              - templateName: ml-prediction-canary
        - setWeight: 50
        - pause: { duration: 60s }
        - analysis:
            templates:
              - templateName: ml-prediction-canary
        - setWeight: 100
        - pause: { duration: 60s }
        - analysis:
            templates:
              - templateName: ml-prediction-canary
---
# Source: smart-city/templates/istio.yaml
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: ml-prediction
  namespace: smart-city
spec:
  hosts: [ml-prediction]
  http:
    - retries:
        attempts: 3
        perTryTimeout: 2s
        retryOn: 5xx,reset,connect-failure
      route:
        # Argo Rollouts rewrites these weights during a canary deploy.
        - destination: { host: ml-prediction, subset: stable }
          weight: 100
        - destination: { host: ml-prediction, subset: canary }
          weight: 0
